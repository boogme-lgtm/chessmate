<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>BooGMe - Book Your Chess Grandmaster | AI-Powered Coaching</title>
    <meta name="description" content="BooGMe - Book your chess Grandmaster! AI-powered coach matching with payment protection, escrow payments, and satisfaction guarantees. Level up your game with expert coaches worldwide." />
    <link rel="canonical" href="https://boogme.com/" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="https://files.manuscdn.com/user_upload_by_module/session_file/310519663188415081/TDPkPQHPJsimfVTe.png" />

    <!--
      Ember Dark is the recommended default per the editorial brief.
      Painting the mobile browser chrome to match avoids the white flash
      between page load and first React paint.
    -->
    <meta name="theme-color" content="#0F1419" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#0F1419" />
    <meta name="color-scheme" content="dark light" />
    <style>
      /* Pre-React paint background — matches Ember Dark surface so the page
       * never flashes white before the bundle hydrates. */
      html, body { background: #0F1419; }
      html.light, html.light body { background: #F5F1E4; }
    </style>
    <script>
      // No-flash theme bootstrap. Reads the persisted theme (if the user
      // ever toggled light) and applies the matching class on <html> before
      // React renders, so :root tokens are correct on first paint.
      (function () {
        try {
          var stored = localStorage.getItem("theme");
          var theme = stored === "light" || stored === "dark" ? stored : "dark";
          document.documentElement.classList.toggle("dark", theme === "dark");
          document.documentElement.classList.toggle("light", theme === "light");
        } catch (_) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://boogme.com/" />
    <meta property="og:site_name" content="BooGMe" />
    <meta property="og:title" content="BooGMe - Book Your Chess Grandmaster" />
    <meta property="og:description" content="AI-powered coach matching with payment protection. Connect with elite chess coaches worldwide." />
    <meta property="og:image" content="https://d2xsxph8kpxj0f.cloudfront.net/310519663188415081/Xkyng35xnYFybYAdmyVo96/boogme-og-image_0b103eae.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="BooGMe - Book Your Chess Grandmaster" />
    <meta name="twitter:description" content="AI-powered coach matching with payment protection. Connect with elite chess coaches worldwide." />
    <meta name="twitter:image" content="https://d2xsxph8kpxj0f.cloudfront.net/310519663188415081/Xkyng35xnYFybYAdmyVo96/boogme-og-image_0b103eae.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Source+Serif+4:ital,wght@0,400;0,500;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    
    <!-- Force HTTPS redirect -->
    <script>
      if (window.location.protocol === 'http:' && window.location.hostname !== 'localhost') {
        window.location.href = 'https://' + window.location.hostname + window.location.pathname + window.location.search + window.location.hash;
      }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
  </body>

</html>
